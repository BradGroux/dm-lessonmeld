name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: CLI smoke
        run: scripts/cli-smoke-tests.sh --skip-build

      - name: Validate packaging
        run: |
          plutil -lint Packaging/Info.plist
          plutil -lint Packaging/Entitlements.plist
          bash -n scripts/cli-smoke-tests.sh
          bash -n scripts/capture-device-matrix-smoke.sh
          swiftc -parse-as-library -typecheck scripts/fixtures/WindowCaptureFixture.swift
          bash -n scripts/real-media-fixture-smoke.sh
          python3 -m py_compile scripts/dmlesson-mcp-server.py
          test -f Packaging/AppIcon.icns
          bash -n scripts/build-app.sh
          bash -n scripts/package-app.sh
          bash -n scripts/package-dmg.sh
          bash -n scripts/package-release.sh
          bash -n scripts/test-release-provenance.sh
          bash -n scripts/verify-release-provenance.sh
          bash -n scripts/verify-cask-release.sh
          bash -n scripts/verify-dmg.sh
          ruby -c Casks/dm-lessonmeld.rb
          brew style Casks/dm-lessonmeld.rb
          scripts/test-release-provenance.sh
          scripts/verify-cask-release.sh
          scripts/build-app.sh release >/dev/null
          codesign --verify --strict --deep "Packaging/Digital Meld LessonMeld.app"
          app_entitlements="$(codesign -d --entitlements :- "Packaging/Digital Meld LessonMeld.app" 2>/dev/null)"
          printf '%s' "${app_entitlements}" | grep -q '<key>com.apple.security.device.audio-input</key>'
          printf '%s' "${app_entitlements}" | grep -q '<key>com.apple.security.device.camera</key>'
          package_output="$(scripts/package-release.sh)"
          zip_path="$(printf '%s\n' "${package_output}" | awk -F= '/^zip_path=/{print $2}')"
          dmg_path="$(printf '%s\n' "${package_output}" | awk -F= '/^dmg_path=/{print $2}')"
          test -f "${zip_path}"
          test -f "${dmg_path}"
          shasum -a 256 "${zip_path}" > "${zip_path}.sha256"
          shasum -a 256 "${dmg_path}" > "${dmg_path}.sha256"
          shasum -a 256 -c "${zip_path}.sha256"
          shasum -a 256 -c "${dmg_path}.sha256"
          scripts/verify-dmg.sh "${dmg_path}"
