name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release:
    name: Build release
    runs-on: macos-15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Read version
        id: version
        run: |
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Packaging/Info.plist)"
          build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Packaging/Info.plist)"
          tag="${GITHUB_REF_NAME#v}"

          if [[ "${version}" != "${tag}" ]]; then
            echo "Info.plist version ${version} does not match tag ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build=${build}" >> "${GITHUB_OUTPUT}"

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Validate packaging scripts
        run: |
          plutil -lint Packaging/Info.plist
          bash -n scripts/build-app.sh
          bash -n scripts/capture-device-matrix-smoke.sh
          bash -n scripts/package-app.sh
          bash -n scripts/package-dmg.sh
          bash -n scripts/package-release.sh
          bash -n scripts/real-media-fixture-smoke.sh
          bash -n scripts/verify-dmg.sh
          python3 -m py_compile scripts/dmlesson-mcp-server.py

      - name: Validate signing configuration
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_NOTARIZATION_KEY_BASE64: ${{ secrets.APPLE_NOTARIZATION_KEY_BASE64 }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
        run: |
          missing=()
          for secret_name in \
            APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_DEVELOPER_IDENTITY \
            APPLE_NOTARIZATION_KEY_BASE64 \
            APPLE_NOTARIZATION_KEY_ID \
            APPLE_NOTARIZATION_ISSUER_ID
          do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("${secret_name}")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Tagged releases require Developer ID signing and notarization secrets. Missing: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}" -t cert -f pkcs12 -k "${keychain_path}" -T /usr/bin/codesign
          security list-keychains -d user -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

      - name: Prepare notarization key
        env:
          APPLE_NOTARIZATION_KEY_BASE64: ${{ secrets.APPLE_NOTARIZATION_KEY_BASE64 }}
        run: |
          notarization_key_path="${RUNNER_TEMP}/notarization-key.p8"
          echo "${APPLE_NOTARIZATION_KEY_BASE64}" | base64 --decode > "${notarization_key_path}"
          chmod 600 "${notarization_key_path}"
          echo "NOTARIZE_KEY_PATH=${notarization_key_path}" >> "${GITHUB_ENV}"

      - name: Package app
        id: package
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          NOTARIZE_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          NOTARIZE_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
          DM_LESSONMELD_REQUIRE_NOTARIZATION: "1"
        run: |
          package_output="$(scripts/package-release.sh)"
          echo "${package_output}"

          zip_path="$(printf '%s\n' "${package_output}" | awk -F= '/^zip_path=/{print $2}')"
          dmg_path="$(printf '%s\n' "${package_output}" | awk -F= '/^dmg_path=/{print $2}')"

          if [[ -z "${zip_path}" || -z "${dmg_path}" ]]; then
            echo "package-release.sh did not return zip_path and dmg_path outputs." >&2
            exit 1
          fi

          shasum -a 256 "${zip_path}" > "${zip_path}.sha256"
          shasum -a 256 "${dmg_path}" > "${dmg_path}.sha256"

          codesign --verify --strict --deep --verbose=2 "Packaging/Digital Meld LessonMeld.app"
          spctl --assess --type execute --verbose "Packaging/Digital Meld LessonMeld.app"
          xcrun stapler validate "Packaging/Digital Meld LessonMeld.app"
          scripts/verify-dmg.sh "${dmg_path}"
          xcrun stapler validate "${dmg_path}"

          mkdir -p .build/release-artifacts
          cp "${dmg_path}" .build/release-artifacts/
          cp "${dmg_path}.sha256" .build/release-artifacts/
          cp "${zip_path}" .build/release-artifacts/
          cp "${zip_path}.sha256" .build/release-artifacts/

      - name: Write release notes
        run: |
          cat > .build/release-artifacts/release-notes.md <<'EOF'
          ## dm-lessonmeld ${{ steps.version.outputs.version }}

          Digital Meld LessonMeld is a local-first macOS recording suite for curriculum builders.

          ### Install

          1. Download \`dm-lessonmeld-${{ steps.version.outputs.version }}-macos.dmg\`.
          2. Open the DMG.
          3. Drag \`Digital Meld LessonMeld.app\` to Applications.
          4. Open the app and grant macOS permissions when prompted.

          Homebrew users can install from the public tap after the cask is updated:

          \`\`\`sh
          brew tap BradGroux/tap
          brew install --cask dm-lessonmeld
          \`\`\`

          ### Verification

          This release workflow ran:

          - \`swift build\`
          - \`swift test\`
          - \`plutil -lint Packaging/Info.plist\`
          - packaging script syntax checks
          - Developer ID signing
          - Apple notarization and stapler validation
          - DMG and zip SHA256 generation

          ### Signing status

          This release is Developer ID signed and notarized. The DMG is the primary install artifact; the zip remains attached for automation and cask update workflows.
          EOF

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dm-lessonmeld-release-${{ steps.version.outputs.version }}
          path: .build/release-artifacts/
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: macos-15
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: dm-lessonmeld-release-${{ needs.build-release.outputs.version }}
          path: release-artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build-release.outputs.version }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.dmg" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.dmg.sha256" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.zip" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.zip.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "dm-lessonmeld ${VERSION}" \
            --notes-file release-artifacts/release-notes.md
