name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DM_LESSONMELD_RELEASE_MODE: ${{ vars.DM_LESSONMELD_RELEASE_MODE }}

jobs:
  build-release:
    name: Build release
    runs-on: macos-15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read version
        id: version
        run: |
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Packaging/Info.plist)"
          build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Packaging/Info.plist)"
          tag="${GITHUB_REF_NAME#v}"

          if [[ "${version}" != "${tag}" ]]; then
            echo "Info.plist version ${version} does not match tag ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build=${build}" >> "${GITHUB_OUTPUT}"

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Validate packaging scripts
        run: |
          plutil -lint Packaging/Info.plist
          bash -n scripts/build-app.sh
          bash -n scripts/capture-device-matrix-smoke.sh
          bash -n scripts/package-app.sh
          bash -n scripts/package-dmg.sh
          bash -n scripts/package-release.sh
          bash -n scripts/real-media-fixture-smoke.sh
          bash -n scripts/verify-cask-release.sh
          bash -n scripts/verify-dmg.sh
          python3 -m py_compile scripts/dmlesson-mcp-server.py

      - name: Detect signing configuration
        id: signing
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_NOTARIZATION_KEY_BASE64: ${{ secrets.APPLE_NOTARIZATION_KEY_BASE64 }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
        run: |
          release_mode="$(printf '%s' "${DM_LESSONMELD_RELEASE_MODE:-signed}" | tr '[:upper:]' '[:lower:]')"
          case "${release_mode}" in
            signed|unsigned-preview) ;;
            *)
              echo "error: DM_LESSONMELD_RELEASE_MODE must be signed or unsigned-preview, got '${release_mode}'." >&2
              exit 1
              ;;
          esac

          missing=()
          for secret_name in \
            APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_DEVELOPER_IDENTITY \
            APPLE_NOTARIZATION_KEY_BASE64 \
            APPLE_NOTARIZATION_KEY_ID \
            APPLE_NOTARIZATION_ISSUER_ID
          do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("${secret_name}")
            fi
          done

          if [[ "${release_mode}" == "signed" ]]; then
            if [[ "${#missing[@]}" -gt 0 ]]; then
              printf 'error: signed release expected but Apple signing/notarization secrets are missing: %s\n' "${missing[*]}" >&2
              echo "Set repository variable DM_LESSONMELD_RELEASE_MODE=unsigned-preview only for an intentional unsigned developer-preview release." >&2
              exit 1
            fi

            echo "configured=1" >> "${GITHUB_OUTPUT}"
            echo "mode=${release_mode}" >> "${GITHUB_OUTPUT}"
            echo "status=Developer ID signed and Apple notarized" >> "${GITHUB_OUTPUT}"
          else
            if [[ "${#missing[@]}" -ne 0 && "${#missing[@]}" -ne 6 ]]; then
              printf 'error: unsigned-preview release has a partial Apple signing/notarization secret set: %s\n' "${missing[*]}" >&2
              echo "Remove the partial Apple secret set or switch DM_LESSONMELD_RELEASE_MODE=signed after configuring all required secrets." >&2
              exit 1
            fi

            echo "configured=0" >> "${GITHUB_OUTPUT}"
            echo "mode=${release_mode}" >> "${GITHUB_OUTPUT}"
            echo "status=Unsigned, non-notarized developer preview" >> "${GITHUB_OUTPUT}"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.configured == '1'
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}" -t cert -f pkcs12 -k "${keychain_path}" -T /usr/bin/codesign
          security list-keychains -d user -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

      - name: Prepare notarization key
        id: notarization
        if: steps.signing.outputs.configured == '1'
        env:
          APPLE_NOTARIZATION_KEY_BASE64: ${{ secrets.APPLE_NOTARIZATION_KEY_BASE64 }}
        run: |
          notarization_key_path="${RUNNER_TEMP}/notarization-key.p8"
          echo "${APPLE_NOTARIZATION_KEY_BASE64}" | base64 --decode > "${notarization_key_path}"
          chmod 600 "${notarization_key_path}"
          echo "key_path=${notarization_key_path}" >> "${GITHUB_OUTPUT}"

      - name: Package app
        id: package
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          NOTARIZE_KEY_PATH: ${{ steps.notarization.outputs.key_path }}
          NOTARIZE_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          NOTARIZE_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
          DM_LESSONMELD_REQUIRE_NOTARIZATION: ${{ steps.signing.outputs.configured }}
          RELEASE_MODE: ${{ steps.signing.outputs.mode }}
          SIGNING_CONFIGURED: ${{ steps.signing.outputs.configured }}
        run: |
          if [[ "${SIGNING_CONFIGURED}" != "1" ]]; then
            unset CODESIGN_IDENTITY NOTARIZE_KEY_ID NOTARIZE_ISSUER_ID NOTARIZE_KEY_PATH
          fi

          package_output="$(scripts/package-release.sh)"
          echo "${package_output}"

          zip_path="$(printf '%s\n' "${package_output}" | awk -F= '/^zip_path=/{print $2}')"
          dmg_path="$(printf '%s\n' "${package_output}" | awk -F= '/^dmg_path=/{print $2}')"

          if [[ -z "${zip_path}" || -z "${dmg_path}" ]]; then
            echo "package-release.sh did not return zip_path and dmg_path outputs." >&2
            exit 1
          fi

          zip_dir="$(dirname "${zip_path}")"
          zip_name="$(basename "${zip_path}")"
          dmg_dir="$(dirname "${dmg_path}")"
          dmg_name="$(basename "${dmg_path}")"

          (
            cd "${zip_dir}"
            shasum -a 256 "${zip_name}" > "${zip_name}.sha256"
            shasum -a 256 -c "${zip_name}.sha256"
          )
          (
            cd "${dmg_dir}"
            shasum -a 256 "${dmg_name}" > "${dmg_name}.sha256"
            shasum -a 256 -c "${dmg_name}.sha256"
          )

          codesign --verify --strict --deep --verbose=2 "Packaging/Digital Meld LessonMeld.app"
          scripts/verify-dmg.sh "${dmg_path}"

          if [[ "${SIGNING_CONFIGURED}" == "1" ]]; then
            spctl --assess --type execute --verbose "Packaging/Digital Meld LessonMeld.app"
            xcrun stapler validate "Packaging/Digital Meld LessonMeld.app"
            xcrun stapler validate "${dmg_path}"
          else
            echo "Unsigned developer-preview release: skipped spctl and stapler validation."
          fi

          mkdir -p .build/release-artifacts
          cp "${dmg_path}" .build/release-artifacts/
          cp "${dmg_path}.sha256" .build/release-artifacts/
          cp "${zip_path}" .build/release-artifacts/
          cp "${zip_path}.sha256" .build/release-artifacts/

      - name: Remove notarization material
        if: always() && steps.signing.outputs.configured == '1'
        env:
          NOTARIZE_KEY_PATH: ${{ steps.notarization.outputs.key_path }}
        run: |
          if [[ -n "${NOTARIZE_KEY_PATH:-}" ]]; then
            rm -f "${NOTARIZE_KEY_PATH}"
          fi

      - name: Write release notes
        env:
          SIGNING_CONFIGURED: ${{ steps.signing.outputs.configured }}
          SIGNING_STATUS: ${{ steps.signing.outputs.status }}
        run: |
          if [[ "${SIGNING_CONFIGURED}" == "1" ]]; then
            signing_status="This release is Developer ID signed and notarized. The DMG is the primary install artifact; the zip remains attached for automation and cask update workflows."
          else
            signing_status="This is an unsigned, non-notarized developer-preview release. macOS may block the app after download; use the Gatekeeper workaround in docs/RELEASE.md only if you trust the source. The DMG is attached for manual installation, and the zip remains attached for automation and cask update workflows."
          fi

          cat > .build/release-artifacts/release-notes.md <<'EOF'
          ## dm-lessonmeld ${{ steps.version.outputs.version }}

          Digital Meld LessonMeld is a local-first macOS recording suite for curriculum builders.

          ### Install

          1. Download \`dm-lessonmeld-${{ steps.version.outputs.version }}-macos.dmg\`.
          2. Open the DMG.
          3. Drag \`Digital Meld LessonMeld.app\` to Applications.
          4. Open the app and grant macOS permissions when prompted.

          Homebrew users can install from the public tap after the cask is updated:

          \`\`\`sh
          brew tap BradGroux/tap
          brew install --cask dm-lessonmeld
          \`\`\`

          ### Verification

          This release workflow ran:

          - \`swift build\`
          - \`swift test\`
          - \`plutil -lint Packaging/Info.plist\`
          - packaging script syntax checks
          - DMG and zip SHA256 generation
          EOF

          if [[ "${SIGNING_CONFIGURED}" == "1" ]]; then
            cat >> .build/release-artifacts/release-notes.md <<'EOF'
          - Developer ID signing
          - Apple notarization and stapler validation
          EOF
          else
            cat >> .build/release-artifacts/release-notes.md <<'EOF'
          - ad-hoc app signature verification
          - unsigned, non-notarized DMG verification
          EOF
          fi

          cat >> .build/release-artifacts/release-notes.md <<EOF

          ### Signing status

          ${signing_status}
          EOF

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dm-lessonmeld-release-${{ steps.version.outputs.version }}
          path: .build/release-artifacts/
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: macos-15
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dm-lessonmeld-release-${{ needs.build-release.outputs.version }}
          path: release-artifacts

      - name: Verify downloaded release artifacts
        run: |
          cd release-artifacts
          shasum -a 256 -c "dm-lessonmeld-${{ needs.build-release.outputs.version }}-macos.dmg.sha256"
          shasum -a 256 -c "dm-lessonmeld-${{ needs.build-release.outputs.version }}-macos.zip.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build-release.outputs.version }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.dmg" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.dmg.sha256" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.zip" \
            "release-artifacts/dm-lessonmeld-${VERSION}-macos.zip.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "dm-lessonmeld ${VERSION}" \
            --notes-file release-artifacts/release-notes.md
